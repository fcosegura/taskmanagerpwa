<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Task Manager</title>
    <meta name="description" content="Gestión de tareas, calendario y tablero de notas">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="TaskMgr">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/chrono-node/dist/chrono.min.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Definimos las variables de diseño que pedía tu código */
        :root {
            --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --border-radius-md: 12px;
            --border-radius-lg: 22px;
            --shadow-card: 0 18px 45px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.06);

            --color-background-primary: #ffffff;
            --color-background-secondary: #f7f8fb;
            --color-background-tertiary: #eef3fb;

            --color-text-primary: #111827;
            --color-text-secondary: #4b5563;

            --color-border-primary: #9ca3af;
            --color-border-secondary: #d1d5db;
            --color-border-tertiary: #e5e7eb;
            --color-accent: #2563eb;
            --color-accent-soft: #dbeafe;

            --color-text-info: #0284c7;
            --color-background-info: #e0f2fe;
            --color-border-info: #7dd3fc;

            --color-text-warning: #d97706;
            --color-background-warning: #fef3c7;
            --color-border-warning: #fde047;

            --color-text-danger: #dc2626;
            --color-background-danger: #fee2e2;
            --color-border-danger: #fca5a5;

            --color-text-success: #16a34a;
            --color-background-success: #dcfce7;
            --color-border-success: #86efac;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #eef3fb 0%, #fdfdff 100%);
            font-family: var(--font-sans);
            color: var(--color-text-primary);
            line-height: 1.5;
        }

        button {
            font: inherit;
            outline: none;
        }

        button:focus-visible {
            outline: 2px solid var(--color-text-info);
            outline-offset: 2px;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STORAGE_KEY = "taskmanager_v1";

        const STATUS = [
            { v: "not_done", label: "Sin iniciar", tv: "--color-text-secondary", bv: "--color-background-secondary", bov: "--color-border-secondary" },
            { v: "started", label: "Iniciado", tv: "--color-text-info", bv: "--color-background-info", bov: "--color-border-info" },
            { v: "in_progress", label: "En progreso", tv: "--color-text-warning", bv: "--color-background-warning", bov: "--color-border-warning" },
            { v: "blocked", label: "Bloqueado", tv: "--color-text-danger", bv: "--color-background-danger", bov: "--color-border-danger" },
            { v: "done", label: "Completado", tv: "--color-text-success", bv: "--color-background-success", bov: "--color-border-success" },
        ];

        const PRIORITY = [
            { v: "low", label: "Baja", tv: "--color-text-secondary", bv: "--color-background-secondary", bov: "--color-border-secondary" },
            { v: "medium", label: "Media", tv: "--color-text-info", bv: "--color-background-info", bov: "--color-border-info" },
            { v: "high", label: "Alta", tv: "--color-text-warning", bv: "--color-background-warning", bov: "--color-border-warning" },
            { v: "critical", label: "Crítica", tv: "--color-text-danger", bv: "--color-background-danger", bov: "--color-border-danger" },
        ];

        const P_ORDER = { critical: 0, high: 1, medium: 2, low: 3 };
        const MONTHS = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const DAYS = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];

        // CORRECCIÓN: Cambiado de window.storage a localStorage nativo
        function isValidTask(task) {
            if (!task || typeof task !== "object") return false;
            const { id, description, status, priority, subtasks, category, date, time } = task;
            if (typeof id !== "string" || typeof description !== "string") return false;
            if (typeof status !== "string" || !STATUS.some(s => s.v === status)) return false;
            if (typeof priority !== "string" || !PRIORITY.some(p => p.v === priority)) return false;
            if (category !== undefined && category !== null && typeof category !== "string") return false;
            if (date !== undefined && date !== null && typeof date !== "string") return false;
            if (time !== undefined && time !== null && typeof time !== "string") return false;
            if (!Array.isArray(subtasks)) return false;
            return subtasks.every(st => st && typeof st === "object" && typeof st.id === "string" && typeof st.text === "string" && typeof st.done === "boolean");
        }
        function isValidEvent(event) {
            if (!event || typeof event !== "object") return false;
            const { id, title, startDate, endDate, color } = event;
            if (typeof id !== "string" || typeof title !== "string") return false;
            if (typeof startDate !== "string" || (endDate && typeof endDate !== "string")) return false;
            if (typeof color !== "string") return false;
            return true;
        }
        function isValidBoardNote(note) {
            return note && typeof note === "object" && typeof note.id === "string" && typeof note.title === "string" && typeof note.text === "string" && typeof note.createdAt === "string" && (note.x === undefined || typeof note.x === "number") && (note.y === undefined || typeof note.y === "number");
        }
        function validateBackupPayload(payload) {
            if (!payload || typeof payload !== "object") return false;
            if (!Array.isArray(payload.tasks) || !payload.tasks.every(isValidTask)) return false;
            if (payload.boardNotes !== undefined && (!Array.isArray(payload.boardNotes) || !payload.boardNotes.every(isValidBoardNote))) return false;
            if (payload.events !== undefined && (!Array.isArray(payload.events) || !payload.events.every(isValidEvent))) return false;
            return true;
        }
        function loadSafeData(parsed) {
            if (Array.isArray(parsed) && parsed.every(isValidTask)) {
                return { tasks: parsed, boardNotes: [], events: [] };
            }
            if (parsed && typeof parsed === "object" && Array.isArray(parsed.tasks) && parsed.tasks.every(isValidTask)) {
                const boardNotes = Array.isArray(parsed.boardNotes) && parsed.boardNotes.every(isValidBoardNote) ? parsed.boardNotes : [];
                const events = Array.isArray(parsed.events) && parsed.events.every(isValidEvent) ? parsed.events : [];
                return { tasks: parsed.tasks, boardNotes, events };
            }
            return { tasks: [], boardNotes: [], events: [] };
        }
        async function loadData() {
            try {
                const r = localStorage.getItem(STORAGE_KEY);
                if (!r) return { tasks: [], boardNotes: [], events: [] };
                const parsed = JSON.parse(r);
                return loadSafeData(parsed);
            } catch {
                return { tasks: [], boardNotes: [], events: [] };
            }
        }
        async function saveData(payload) {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch { }
        }

        function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
        function fmtDate(s) {
            if (!s) return "";
            const [y, m, d] = s.split("-");
            return `${parseInt(d)} ${MONTHS[parseInt(m) - 1].slice(0, 3)} ${y}`;
        }
        function toDateStr(y, mo, d) {
            return `${y}-${String(mo + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        }
        function linkifyText(text) {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/gi;
            const urlTest = /(https?:\/\/[^\s]+|www\.[^\s]+)/i;
            const parts = text.split(urlRegex);
            return parts.map((part, index) => {
                if (!part) return null;
                if (urlTest.test(part)) {
                    const href = part.startsWith("http") ? part : `https://${part}`;
                    return (
                        <a key={index} href={href} target="_blank" rel="noreferrer" style={{ color: "var(--color-accent)", textDecoration: "underline" }}>
                            {part}
                        </a>
                    );
                }
                return <span key={index}>{part}</span>;
            });
        }

        const parseDateFromDescription = text => {
            const chrono = window.chrono || window.Chrono || window.chronoNode || window.ChronoNode;
            if (!chrono) return null;
            const parser = chrono.es || chrono;
            if (typeof parser.parseDate === "function") {
                return parser.parseDate(text, new Date(), { forwardDate: true }) || null;
            }
            if (typeof chrono.parseDate === "function") {
                return chrono.parseDate(text, new Date(), { forwardDate: true }) || null;
            }
            return null;
        };

        const parseDescriptionDateResult = text => {
            const chrono = window.chrono || window.Chrono || window.chronoNode || window.ChronoNode;
            if (!chrono) return null;
            const parser = chrono.es || chrono;
            const parseFn = typeof parser.parse === "function" ? parser.parse : typeof chrono.parse === "function" ? chrono.parse : null;
            if (!parseFn) return null;
            const results = parseFn(text, new Date(), { forwardDate: true });
            return Array.isArray(results) && results.length > 0 ? results[0] : null;
        };

        const stripDiacritics = text => text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const escapeRegExp = value => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const cleanDescriptionSegment = (text, segment) => {
            if (!segment) return text.trim();
            const source = text || "";
            const normalized = stripDiacritics(source).toLowerCase();
            const needle = stripDiacritics(segment).toLowerCase();
            const index = normalized.indexOf(needle);
            let cleaned = source;
            if (index >= 0) {
                cleaned = source.slice(0, index) + source.slice(index + segment.length);
            } else {
                cleaned = source.replace(new RegExp(escapeRegExp(segment), "i"), "");
            }
            cleaned = cleaned.replace(/\s{2,}/g, " ").trim();
            cleaned = cleaned.replace(/^(a|a las|a la|al|el|la|en|para)\s+/i, "").replace(/\s+(a|a las|a la|al|el|la|en|para)$/i, "").trim();
            return cleaned;
        };

        const parseDateTimeFromDescription = text => {
            if (!text) return null;
            const found = parseDateFromDescription(text);
            if (found) {
                const date = toDateStr(found.getFullYear(), found.getMonth(), found.getDate());
                const hasTime = found.getHours() !== 0 || found.getMinutes() !== 0;
                const time = hasTime ? `${String(found.getHours()).padStart(2, "0")}:${String(found.getMinutes()).padStart(2, "0")}` : "";
                return { date, time };
            }

            const lower = text.toLowerCase();
            const timeMatch = lower.match(/(\d{1,2})(?::|h)(\d{2})/);
            const time = timeMatch ? `${String(parseInt(timeMatch[1], 10)).padStart(2, "0")}:${String(parseInt(timeMatch[2], 10)).padStart(2, "0")}` : "";

            const MONTHS_MAP = {
                enero: 0, ene: 0, febrero: 1, feb: 1, marzo: 2, mar: 2,
                abril: 3, abr: 3, mayo: 4, may: 4, junio: 5, jun: 5,
                julio: 6, jul: 6, agosto: 7, ago: 7, septiembre: 8, sep: 8, sept: 8,
                octubre: 9, oct: 9, noviembre: 10, nov: 10, diciembre: 11, dic: 11,
            };
            const WEEKDAYS_MAP = {
                domingo: 0, lunes: 1, martes: 2, miércoles: 3, miercoles: 3,
                jueves: 4, viernes: 5, sábado: 6, sabado: 6,
            };

            const today = new Date();
            let date = "";

            const weekdayMatch = lower.match(/(?:el\s+)?(?:pr[oó]ximo\s+|este\s+)?(domingo|lunes|martes|mi[eé]rcoles|jueves|viernes|s[aá]bado)(?:\s+de\s+este\s+mes)?/);
            if (weekdayMatch) {
                const target = WEEKDAYS_MAP[weekdayMatch[1]];
                if (typeof target === "number") {
                    const start = new Date(today);
                    start.setHours(0, 0, 0, 0);
                    let delta = (target - start.getDay() + 7) % 7;
                    if (delta === 0) delta = 7;
                    const candidate = new Date(start);
                    candidate.setDate(start.getDate() + delta);
                    if (/de\s+este\s+mes/.test(lower)) {
                        candidate.setDate(1);
                        while (candidate.getMonth() === today.getMonth()) {
                            if (candidate.getDay() === target && candidate >= today) {
                                date = toDateStr(candidate.getFullYear(), candidate.getMonth(), candidate.getDate());
                                break;
                            }
                            candidate.setDate(candidate.getDate() + 1);
                        }
                    } else {
                        date = toDateStr(candidate.getFullYear(), candidate.getMonth(), candidate.getDate());
                    }
                }
            }

            if (!date) {
                const monthNameMatch = lower.match(/(?:el\s*)?(\d{1,2})(?:º|ª)?\s*(?:de\s*)?(enero|febrero|marzo|abril|mayo|junio|julio|agosto|septiembre|octubre|noviembre|diciembre|ene|feb|mar|abr|may|jun|jul|ago|sep|sept|oct|nov|dic)(?:\s*de\s*(\d{2,4}))?/);
                if (monthNameMatch) {
                    const day = parseInt(monthNameMatch[1], 10);
                    const month = MONTHS_MAP[monthNameMatch[2]];
                    let year = monthNameMatch[3] ? parseInt(monthNameMatch[3], 10) : today.getFullYear();
                    if (year < 100) year += 2000;
                    if (!Number.isNaN(day) && month >= 0) {
                        date = toDateStr(year, month, day);
                    }
                }
            }

            if (!date) {
                if (/pasado\s*mañana/.test(lower)) {
                    const next = new Date(today);
                    next.setDate(next.getDate() + 2);
                    date = toDateStr(next.getFullYear(), next.getMonth(), next.getDate());
                } else if (/mañana/.test(lower)) {
                    const next = new Date(today);
                    next.setDate(next.getDate() + 1);
                    date = toDateStr(next.getFullYear(), next.getMonth(), next.getDate());
                } else if (/hoy|día de hoy|dia de hoy|el dia de hoy|el día de hoy/.test(lower)) {
                    date = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());
                } else {
                    const dateMatch = lower.match(/(\d{1,2})[\/\.\-](\d{1,2})(?:[\/\.\-](\d{2,4}))?/);
                    if (dateMatch) {
                        const day = parseInt(dateMatch[1], 10);
                        const month = parseInt(dateMatch[2], 10) - 1;
                        let year = dateMatch[3] ? parseInt(dateMatch[3], 10) : today.getFullYear();
                        if (year < 100) year += 2000;
                        date = toDateStr(year, month, day);
                    }
                }
            }

            return date || time ? { date, time } : null;
        };

        function BoardNoteCard({ note, onDelete, onUpdate, onPointerDown, isDragging }) {
            return (
                <div onPointerDown={onPointerDown} style={{ position: "absolute", left: note.x || 0, top: note.y || 0, zIndex: isDragging ? 50 : 10, cursor: isDragging ? "grabbing" : "grab", background: "#fef3c7", border: "1px solid #fcd34d", borderRadius: 20, padding: 14, minHeight: 220, width: 220, display: "flex", flexDirection: "column", gap: 10, boxShadow: isDragging ? "0 25px 50px -12px rgba(0,0,0,0.25)" : "0 12px 24px rgba(15,23,42,0.08)", transition: isDragging ? "none" : "box-shadow 0.2s" }}>
                    <button type="button" onClick={() => onDelete(note.id)} aria-label="Eliminar nota" style={{ position: "absolute", top: 10, right: 10, border: "none", background: "transparent", color: "#6b7280", cursor: "pointer", fontSize: 16, lineHeight: 1 }}>×</button>
                    <input value={note.title} onChange={e => onUpdate(note.id, { title: e.target.value })} placeholder="Título" style={{ width: "100%", border: "none", background: "transparent", fontSize: 13, fontWeight: 700, color: "#92400e", outline: "none" }} />
                    <textarea value={note.text} onChange={e => onUpdate(note.id, { text: e.target.value })} placeholder="Escribe aquí..." style={{ flex: 1, width: "100%", minHeight: 120, resize: "none", border: "none", background: "transparent", fontSize: 13, color: "#374151", lineHeight: 1.4, outline: "none", whiteSpace: "pre-wrap" }} />
                    <div style={{ fontSize: 10, color: "#6b7280", textAlign: "right" }}>{new Date(note.createdAt).toLocaleDateString()}</div>
                </div>
            );
        }

        function BoardView({ notes, onAddNote, onUpdateNote, onDeleteNote }) {
            const boardRef = useRef(null);
            const [draggedId, setDraggedId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

            const handlePointerDown = (e, note) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
                e.preventDefault();
                e.currentTarget.setPointerCapture(e.pointerId);
                setDraggedId(note.id);
                const rect = e.currentTarget.getBoundingClientRect();
                setDragOffset({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                });
            };

            const handlePointerMove = (e) => {
                if (!draggedId || !boardRef.current) return;
                const rect = boardRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left - dragOffset.x;
                const y = e.clientY - rect.top - dragOffset.y;
                onUpdateNote(draggedId, { x, y });
            };

            const handlePointerUp = (e) => {
                if (draggedId) {
                    e.currentTarget.releasePointerCapture(e.pointerId);
                    setDraggedId(null);
                }
            };

            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12, background: "var(--color-background-primary)", borderRadius: "var(--border-radius-lg)", padding: 20, boxShadow: "var(--shadow-soft)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                            <div>
                                <div style={{ fontSize: 16, fontWeight: 700 }}>Tablero de notas</div>
                                <div style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>Crea, arrastra y edita notas directamente en el tablero.</div>
                            </div>
                            <button type="button" onClick={() => onAddNote({ id: uid(), title: "", text: "", createdAt: new Date().toISOString(), x: 20 + Math.random() * 40, y: 20 + Math.random() * 40 })} style={{ width: 40, height: 40, borderRadius: 999, border: "none", background: "#f59e0b", color: "white", fontSize: 24, fontWeight: 700, cursor: "pointer", boxShadow: "0 10px 20px rgba(245,158,11,0.24)" }}>+</button>
                        </div>
                        <div style={{ fontSize: 13, color: "var(--color-text-secondary)" }}>Las notas son libres. Añade post-its, muévelos donde quieras y organiza tus ideas.</div>
                    </div>

                    <div ref={boardRef} onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} style={{ position: "relative", minHeight: "calc(100vh - 280px)", width: "100%", backgroundColor: "#f8fafc", backgroundImage: "radial-gradient(#cbd5e1 1.5px, transparent 1.5px)", backgroundSize: "24px 24px", borderRadius: "var(--border-radius-lg)", overflow: "hidden", border: "1px solid var(--color-border-tertiary)", boxShadow: "var(--shadow-soft)" }}>
                        {notes.length === 0 ? (
                            <div style={{ position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)", color: "var(--color-text-secondary)", textAlign: "center" }}>
                                Pulsa + para crear tu primer post-it.
                            </div>
                        ) : notes.map((note, index) => {
                            if (note.x === undefined) note.x = (index % 4) * 240 + 20;
                            if (note.y === undefined) note.y = Math.floor(index / 4) * 240 + 20;
                            return (
                                <BoardNoteCard key={note.id} note={note} onDelete={onDeleteNote} onUpdate={onUpdateNote} onPointerDown={(e) => handlePointerDown(e, note)} isDragging={draggedId === note.id} />
                            );
                        })}
                    </div>
                </div>
            );
        }

        function App() {
            const [tasks, setTasks] = useState([]);
            const [boardNotes, setBoardNotes] = useState([]);
            const [events, setEvents] = useState([]);
            const [ready, setReady] = useState(false);
            const [view, setView] = useState("tasks");
            const [modal, setModal] = useState(null);
            const [eventModal, setEventModal] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            const [selDay, setSelDay] = useState(null);
            const [filter, setFilter] = useState("all");
            const [categoryFilter, setCategoryFilter] = useState("all");
            const [searchQuery, setSearchQuery] = useState("");
            const [backupMessage, setBackupMessage] = useState("");
            const fileInputRef = useRef(null);

            useEffect(() => { loadData().then(data => { setTasks(data.tasks); setBoardNotes(data.boardNotes); setEvents(data.events || []); setReady(true); }); }, []);
            useEffect(() => { if (ready) saveData({ tasks, boardNotes, events }); }, [tasks, boardNotes, events, ready]);
            useEffect(() => {
                const onKeyDown = e => { if (e.key === "Escape") { setModal(null); setEventModal(null); } };
                window.addEventListener("keydown", onKeyDown);
                return () => window.removeEventListener("keydown", onKeyDown);
            }, []);

            const toggleDone = id => {
                setTasks(p => p.map(t => t.id === id ? { ...t, status: t.status === "done" ? "not_done" : "done" } : t));
            };

            const downloadBackup = () => {
                const date = new Date().toISOString().slice(0, 10);
                const fileName = `taskmanager-backup-${date}.json`;
                const payload = { tasks, boardNotes, events };
                if (!validateBackupPayload(payload)) {
                    setBackupMessage("Error: los datos internos están corruptos y no se puede exportar el backup.");
                    window.setTimeout(() => setBackupMessage(""), 5000);
                    return;
                }
                const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);
                setBackupMessage(`Exportado ${fileName}`);
                window.setTimeout(() => setBackupMessage(""), 3500);
            };

            const triggerImport = () => {
                fileInputRef.current?.click();
            };

            const handleImportFile = e => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (Array.isArray(parsed)) {
                            if (!parsed.every(isValidTask)) throw new Error("El JSON contiene tareas con formato incorrecto.");
                            setTasks(parsed);
                            setBoardNotes([]);
                        } else if (parsed && typeof parsed === "object") {
                            if (!Array.isArray(parsed.tasks) || !parsed.tasks.every(isValidTask)) {
                                throw new Error("El JSON no contiene una lista válida de tareas.");
                            }
                            if (parsed.boardNotes !== undefined && (!Array.isArray(parsed.boardNotes) || !parsed.boardNotes.every(isValidBoardNote))) {
                                throw new Error("El JSON contiene notas de tablero con formato incorrecto.");
                            }
                            if (parsed.events !== undefined && (!Array.isArray(parsed.events) || !parsed.events.every(isValidEvent))) {
                                throw new Error("El JSON contiene eventos con formato incorrecto.");
                            }
                            setTasks(parsed.tasks);
                            setBoardNotes(Array.isArray(parsed.boardNotes) ? parsed.boardNotes : []);
                            setEvents(Array.isArray(parsed.events) ? parsed.events : []);
                        } else {
                            throw new Error("El archivo JSON no tiene la estructura esperada.");
                        }
                        setFilter("all");
                        setCategoryFilter("all");
                        setModal(null);
                        setEventModal(null);
                        setBackupMessage("Importación completada correctamente.");
                    } catch (err) {
                        setBackupMessage(`Error al importar: ${err.message}`);
                    }
                    e.target.value = "";
                    window.setTimeout(() => setBackupMessage(""), 5000);
                };
                reader.readAsText(file);
            };

            const upsert = task => {
                setTasks(p => task.id ? p.map(t => t.id === task.id ? task : t) : [...p, { ...task, id: uid() }]);
                setModal(null);
            };
            const del = id => { setTasks(p => p.filter(t => t.id !== id)); setModal(null); };
            const open = (init = {}) => setModal({ description: "", status: "not_done", priority: "medium", date: "", time: "", subtasks: [], category: "", ...init });
            const addBoardNote = note => setBoardNotes(p => [note, ...p]);
            const deleteBoardNote = id => setBoardNotes(p => p.filter(note => note.id !== id));
            const updateBoardNote = (id, changes) => setBoardNotes(p => p.map(note => note.id === id ? { ...note, ...changes } : note));
            const upsertEvent = event => {
                setEvents(p => event.id ? p.map(e => e.id === event.id ? event : e) : [...p, { ...event, id: uid() }]);
                setEventModal(null);
            };
            const deleteEvent = id => {
                setEvents(p => p.filter(e => e.id !== id));
                setEventModal(null);
            };
            const openEventModal = (init = {}) => setEventModal({ title: "", startDate: "", endDate: "", color: "#2563eb", ...init });

            const handleQuickAdd = description => {
                if (!description.trim()) return;
                const parsed = parseDateTimeFromDescription(description);
                let cleaned = description;
                if (parsed) {
                    const result = parseDescriptionDateResult(description);
                    cleaned = cleanDescriptionSegment(description, result?.text || "");
                    if (!result?.text || cleaned === description.trim()) {
                        cleaned = cleaned.replace(/(?:\b(?:a|al|a la|a las|el|la|en|para)\b.*)$/i, "").replace(/\s{2,}/g, " ").trim();
                    }
                }
                upsert({
                    description: cleaned || description.trim(),
                    date: parsed?.date || "",
                    time: parsed?.time || "",
                    status: "not_done", priority: "medium", subtasks: [], category: ""
                });
            };

            const y = calDate.getFullYear(), mo = calDate.getMonth();
            const dIM = new Date(y, mo + 1, 0).getDate();
            const fD = new Date(y, mo, 1).getDay();

            const tByDate = {};
            tasks.forEach(t => { if (t.date) { (tByDate[t.date] = tByDate[t.date] || []).push(t); } });

            const eByDate = {};
            events.forEach(e => {
                if (!e.startDate) return;
                let current = new Date(e.startDate + "T12:00:00");
                const end = new Date((e.endDate || e.startDate) + "T12:00:00");
                while (current <= end) {
                    const dStr = toDateStr(current.getFullYear(), current.getMonth(), current.getDate());
                    (eByDate[dStr] = eByDate[dStr] || []).push(e);
                    current.setDate(current.getDate() + 1);
                }
            });

            const categories = Array.from(new Set(tasks.map(t => t.category).filter(Boolean))).sort();
            const now = new Date();
            const todayStr = toDateStr(now.getFullYear(), now.getMonth(), now.getDate());

            const activeTasks = tasks.filter(t => t.status !== "done");
            const baseByStatus = filter === "all"
                ? activeTasks
                : tasks.filter(t => t.status === filter);
            const byCategory = categoryFilter === "all"
                ? baseByStatus
                : baseByStatus.filter(t => t.category === categoryFilter);
            const normalizedSearch = searchQuery.trim().toLowerCase();
            const bySearch = normalizedSearch ? byCategory.filter(t =>
                t.description.toLowerCase().includes(normalizedSearch) ||
                (t.category || "").toLowerCase().includes(normalizedSearch)
            ) : byCategory;
            const sorted = [...bySearch].sort((a, b) => {
                if (a.status === "done" && b.status !== "done") return 1;
                if (b.status === "done" && a.status !== "done") return -1;
                if (a.status === "blocked" && b.status !== "blocked") return -1;
                if (b.status === "blocked" && a.status !== "blocked") return 1;
                return (P_ORDER[a.priority] ?? 3) - (P_ORDER[b.priority] ?? 3);
            });
            const statusBase = categoryFilter === "all"
                ? tasks
                : tasks.filter(t => t.category === categoryFilter);
            const statusCounts = statusBase.reduce((acc, t) => {
                const key = t.status || "not_done";
                acc[key] = (acc[key] || 0) + 1;
                return acc;
            }, {});
            const categoryBase = filter === "all"
                ? activeTasks
                : tasks.filter(t => t.status === filter);
            const categoryCounts = categoryBase.reduce((acc, t) => {
                if (!t.category) return acc;
                acc[t.category] = (acc[t.category] || 0) + 1;
                return acc;
            }, {});
            const totalVisible = baseByStatus.length;
            const isBoardView = view === "board";

            return (
                <div style={{ position: "relative", minHeight: "100vh", fontFamily: "var(--font-sans)", background: "var(--color-background-tertiary)", color: "var(--color-text-primary)" }}>
                    <h2 className="sr-only">Gestor de tareas con calendario</h2>

                    {/* ── Header ── */}
                    <div style={{ background: "var(--color-background-primary)", borderBottom: "0.5px solid rgba(148,163,184,0.18)", padding: "0 20px", minHeight: 72, display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "var(--shadow-soft)" }}>
                        <div style={{ display: "flex", flexDirection: "column", justifyContent: "center", gap: 4 }}>
                            <span style={{ fontSize: 16, fontWeight: 700, color: "var(--color-text-primary)" }}>{view === "board" ? "Tablero" : "Tareas"}</span>
                            <span style={{ fontSize: 12, color: "var(--color-text-secondary)", letterSpacing: "0.04em", textTransform: "uppercase" }}>
                                {view === "board" ? "Notas estilo post-it" : "Gestión de tareas y calendario"}
                            </span>
                        </div>

                        <div style={{ display: "flex", gap: 3, background: "var(--color-background-secondary)", padding: "3px", borderRadius: "var(--border-radius-md)" }}>
                            {[['tasks', 'Tareas'], ['calendar', 'Calendario'], ['board', 'Tablero']].map(([v, l]) => (
                                <button key={v} onClick={() => setView(v)} style={{
                                    padding: "4px 14px", border: "none",
                                    borderRadius: "calc(var(--border-radius-md) - 2px)",
                                    background: view === v ? "var(--color-background-primary)" : "transparent",
                                    color: view === v ? "var(--color-text-primary)" : "var(--color-text-secondary)",
                                    fontSize: 13, fontWeight: view === v ? 500 : 400, cursor: "pointer",
                                }}>{l}</button>
                            ))}
                        </div>

                        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                            <button type="button" onClick={downloadBackup} style={{
                                padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer",
                                border: "1px solid transparent",
                                background: "rgba(37,99,235,0.1)",
                                color: "var(--color-accent)",
                                borderRadius: "999px",
                                transition: "background 150ms ease",
                            }} onMouseEnter={e => e.currentTarget.style.background = "rgba(37,99,235,0.16)"} onMouseLeave={e => e.currentTarget.style.background = "rgba(37,99,235,0.1)"}>
                                Exportar
                            </button>
                            <button type="button" onClick={triggerImport} style={{
                                padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer",
                                border: "1px solid rgba(148,163,184,0.2)",
                                background: "var(--color-background-primary)",
                                color: "var(--color-text-primary)",
                                borderRadius: "999px",
                                transition: "background 150ms ease, box-shadow 150ms ease",
                            }} onMouseEnter={e => e.currentTarget.style.background = "rgba(241,245,249,0.95)"} onMouseLeave={e => e.currentTarget.style.background = "var(--color-background-primary)"}>
                                Importar
                            </button>
                            <button type="button" onClick={() => view === "board" ? addBoardNote({ id: uid(), title: "", text: "", createdAt: new Date().toISOString(), x: 20 + Math.random() * 40, y: 20 + Math.random() * 40 }) : open()} aria-label={view === "board" ? "Crear nueva nota" : "Crear nueva tarea"} style={{
                                padding: "10px 18px", fontSize: 13, fontWeight: 700, cursor: "pointer",
                                border: "none",
                                background: "linear-gradient(135deg, var(--color-accent), #3b82f6)",
                                color: "white",
                                borderRadius: "999px",
                                boxShadow: "0 18px 36px rgba(37,99,235,0.18)",
                                transition: "transform 150ms ease, box-shadow 150ms ease",
                            }} onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-1px)'; e.currentTarget.style.boxShadow = '0 22px 40px rgba(37,99,235,0.22)'; }} onMouseLeave={e => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = '0 18px 36px rgba(37,99,235,0.18)'; }}>
                                {view === "board" ? "+ Nueva nota" : "+ Nueva tarea"}
                            </button>
                        </div>
                    </div>

                    {/* ── Main ── */}
                    {backupMessage && (
                        <div style={{ padding: "10px 20px", color: "var(--color-text-secondary)", fontSize: 13 }}>
                            {backupMessage}
                        </div>
                    )}
                    <input ref={fileInputRef} type="file" accept="application/json" style={{ display: "none" }} onChange={handleImportFile} />
                    <div style={{ padding: "16px 20px" }}>
                        {view === "tasks"
                            ? <TasksView tasks={sorted} allTasks={tasks} total={totalVisible} filter={filter} setFilter={setFilter}
                                searchQuery={searchQuery} setSearchQuery={setSearchQuery}
                                categoryFilter={categoryFilter} setCategoryFilter={setCategoryFilter} categories={categories}
                                statusCounts={statusCounts} categoryCounts={categoryCounts}
                                onEdit={t => setModal(t)} onToggleDone={toggleDone} onAdd={() => open()} onQuickAdd={handleQuickAdd} />
                            : view === "calendar"
                                ? <CalendarView y={y} mo={mo} dIM={dIM} fD={fD} tByDate={tByDate} eByDate={eByDate} todayStr={todayStr}
                                    prev={() => setCalDate(new Date(y, mo - 1, 1))} next={() => setCalDate(new Date(y, mo + 1, 1))}
                                    selDay={selDay} setSelDay={setSelDay}
                                    onAddTaskForDay={date => open({ date })} onEditTask={t => setModal(t)}
                                    onAddEventForDay={date => openEventModal({ startDate: date, endDate: date })} onEditEvent={e => openEventModal(e)} />
                                : <BoardView notes={boardNotes} onAddNote={addBoardNote} onUpdateNote={updateBoardNote} onDeleteNote={deleteBoardNote} />
                        }
                    </div>

                    {/* ── Modal overlay ── */}
                    {modal && (
                        <div onClick={e => e.target === e.currentTarget && setModal(null)} style={{
                            position: "absolute", top: 0, left: 0, right: 0, minHeight: "100%",
                            background: "rgba(0,0,0,0.35)", zIndex: 10,
                            display: "flex", justifyContent: "center", paddingTop: 70,
                        }}>
                            <TaskModal task={modal} categories={categories} onSave={upsert}
                                onDelete={modal.id ? () => del(modal.id) : null}
                                onClose={() => setModal(null)} />
                        </div>
                    )}
                    {eventModal && (
                        <div onClick={e => e.target === e.currentTarget && setEventModal(null)} style={{
                            position: "absolute", top: 0, left: 0, right: 0, minHeight: "100%",
                            background: "rgba(0,0,0,0.35)", zIndex: 10,
                            display: "flex", justifyContent: "center", paddingTop: 70,
                        }}>
                            <EventModal event={eventModal} onSave={upsertEvent}
                                onDelete={eventModal.id ? () => deleteEvent(eventModal.id) : null}
                                onClose={() => setEventModal(null)} />
                        </div>
                    )}
                </div>
            );
        }

        /* ── Shared ── */
        function Pill({ s }) {
            return (
                <span style={{
                    fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 20, whiteSpace: "nowrap",
                    background: `var(${s.bv})`, color: `var(${s.tv})`,
                }}>{s.label}</span>
            );
        }

        function CategoryPill({ name }) {
            return (
                <span style={{
                    fontSize: 11, fontWeight: 500, padding: "2px 8px", borderRadius: 20, whiteSpace: "nowrap",
                    background: "var(--color-background-secondary)", color: "var(--color-text-secondary)", border: "0.5px solid var(--color-border-tertiary)",
                }}>{name}</span>
            );
        }

        function NBtn({ onClick, children }) {
            return (
                <button onClick={onClick} style={{
                    width: 34, height: 34, fontSize: 16, cursor: "pointer",
                    border: "1px solid rgba(148,163,184,0.22)",
                    background: "rgba(255,255,255,0.95)",
                    borderRadius: "999px",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    color: "var(--color-text-secondary)",
                    boxShadow: "0 10px 22px rgba(15,23,42,0.06)",
                }}>{children}</button>
            );
        }

        /* ── Tasks view ── */
        function TasksView({ tasks, allTasks, total, filter, setFilter, searchQuery, setSearchQuery, categoryFilter, setCategoryFilter, categories, statusCounts, categoryCounts, onEdit, onToggleDone, onQuickAdd }) {
            const [quickText, setQuickText] = useState("");
            const [showFilters, setShowFilters] = useState(false);

            const handleQuickSubmit = (e) => {
                e.preventDefault();
                onQuickAdd(quickText);
                setQuickText("");
            };

            const cnt = { ...statusCounts };
            STATUS.forEach(s => { if (cnt[s.v] === undefined) cnt[s.v] = 0; });
            const catCount = {};
            categories.forEach(cat => { catCount[cat] = categoryCounts[cat] || 0; });

            return (
                <div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 16, marginBottom: 20 }}>

                        <div style={{ display: "flex", flexWrap: "wrap", gap: 14, alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ position: "relative", minWidth: 280, flex: 1, maxWidth: 400 }}>
                                <span style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", color: "var(--color-text-secondary)", fontSize: 14 }}>
                                    🔍
                                </span>
                                <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Buscar tareas o categorías..." style={{ width: "100%", height: 42, padding: "10px 14px 10px 40px", borderRadius: "999px", border: "1px solid rgba(148,163,184,0.25)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", fontSize: 13, boxShadow: "0 2px 8px rgba(15,23,42,0.02)", transition: "border 0.2s, box-shadow 0.2s" }} onFocus={e => { e.target.style.borderColor = "var(--color-border-info)"; e.target.style.boxShadow = "0 4px 12px rgba(56,189,248,0.1)"; }} onBlur={e => { e.target.style.borderColor = "rgba(148,163,184,0.25)"; e.target.style.boxShadow = "0 2px 8px rgba(15,23,42,0.02)"; }} />
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                <button type="button" onClick={() => setShowFilters(p => !p)} style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", padding: "8px 14px", borderRadius: 999, cursor: "pointer", fontSize: 13, fontWeight: 500, color: showFilters ? "var(--color-accent)" : "var(--color-text-secondary)", boxShadow: "0 2px 8px rgba(15,23,42,0.02)", display: "flex", alignItems: "center", gap: 6, transition: "background 0.2s" }} onMouseEnter={e => e.currentTarget.style.background = "var(--color-background-secondary)"} onMouseLeave={e => e.currentTarget.style.background = "var(--color-background-primary)"}>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                                    Filtros {(filter !== "all" || categoryFilter !== "all") && <span style={{ width: 6, height: 6, borderRadius: "50%", background: "var(--color-accent)" }} />}
                                </button>
                                <div style={{ display: "flex", alignItems: "center", gap: 6, background: "var(--color-background-primary)", padding: "8px 16px", borderRadius: 999, border: "0.5px solid var(--color-border-tertiary)", boxShadow: "0 2px 8px rgba(15,23,42,0.02)" }}>
                                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: "var(--color-text-info)", display: "inline-block" }} />
                                    <span style={{ color: "var(--color-text-secondary)", fontSize: 12, fontWeight: 500, whiteSpace: "nowrap" }}>
                                        Mostrando <strong style={{ color: "var(--color-text-primary)" }}>{tasks.length}</strong> de {total}
                                    </span>
                                </div>
                            </div>
                        </div>

                        {showFilters && (
                            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                                <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center", background: "rgba(255,255,255,0.4)", padding: "6px 10px", borderRadius: 16 }}>
                                    <span style={{ fontSize: 11, color: "var(--color-text-secondary)", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em", minWidth: 65, textAlign: "right" }}>Etapa</span>
                                    <div style={{ width: 1, height: 16, background: "var(--color-border-secondary)" }} />
                                    <Chip label="Todas" count={total} active={filter === "all"} onClick={() => setFilter("all")} />
                                    {STATUS.map(s => (
                                        <Chip key={s.v} label={s.label} count={cnt[s.v]}
                                            active={filter === s.v} onClick={() => setFilter(filter === s.v ? "all" : s.v)}
                                            colorVar={s.tv} />
                                    ))}
                                </div>

                                {categories.length > 0 && (
                                    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center", background: "rgba(255,255,255,0.4)", padding: "6px 10px", borderRadius: 16 }}>
                                        <span style={{ fontSize: 11, color: "var(--color-text-secondary)", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.04em", minWidth: 65, textAlign: "right" }}>Etiqueta</span>
                                        <div style={{ width: 1, height: 16, background: "var(--color-border-secondary)" }} />
                                        <Chip label="Todas" count={total} active={categoryFilter === "all"} onClick={() => setCategoryFilter("all")} />
                                        {categories.map(cat => (
                                            <Chip key={cat} label={cat} count={catCount[cat] || 0}
                                                active={categoryFilter === cat} onClick={() => setCategoryFilter(categoryFilter === cat ? "all" : cat)}
                                                colorVar="--color-text-info" />
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {tasks.length === 0 ? (
                        <div style={{ padding: "60px 0", textAlign: "center", color: "var(--color-text-secondary)", fontSize: 14 }}>
                            {searchQuery ? "No hay tareas que coincidan con tu búsqueda." : filter !== "all" ? "No hay tareas con este filtro." : "Sin tareas aún. Usa el campo inferior para crear la primera!"}
                        </div>
                    ) : (
                        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
                            {tasks.map(t => <TaskRow key={t.id} task={t} onClick={() => onEdit(t)} onToggleDone={onToggleDone} />)}
                        </div>
                    )}

                    <form onSubmit={handleQuickSubmit} style={{ marginTop: 24, position: "sticky", bottom: 20, zIndex: 10, background: "var(--color-background-primary)", borderRadius: 999, padding: "6px 6px 6px 20px", display: "flex", gap: 10, alignItems: "center", boxShadow: "0 10px 40px -10px rgba(15,23,42,0.15)", border: "1px solid var(--color-border-tertiary)", transition: "box-shadow 0.2s" }} onFocus={e => e.currentTarget.style.boxShadow = "0 15px 50px -10px rgba(37,99,235,0.2)"} onBlur={e => e.currentTarget.style.boxShadow = "0 10px 40px -10px rgba(15,23,42,0.15)"}>
                        <span style={{ color: "var(--color-accent)", fontSize: 18 }}>+</span>
                        <input value={quickText} onChange={e => setQuickText(e.target.value)} placeholder="Ej: Revisar el reporte mañana..." style={{ flex: 1, border: "none", background: "transparent", fontSize: 14, outline: "none", color: "var(--color-text-primary)" }} />
                        <button type="submit" disabled={!quickText.trim()} style={{ background: quickText.trim() ? "var(--color-accent)" : "var(--color-background-secondary)", color: quickText.trim() ? "white" : "var(--color-text-secondary)", border: "none", padding: "10px 20px", borderRadius: 999, fontSize: 13, fontWeight: 700, cursor: quickText.trim() ? "pointer" : "not-allowed", transition: "all 0.2s" }}>
                            Añadir
                        </button>
                    </form>

                </div>
            );
        }

        function Chip({ label, count, active, onClick, colorVar }) {
            return (
                <button onClick={onClick} style={{
                    padding: "8px 14px", borderRadius: 999, cursor: "pointer",
                    border: "none",
                    background: active ? "rgba(59,130,246,0.12)" : "rgba(255,255,255,0.8)",
                    color: active && colorVar ? `var(${colorVar})` : active ? "var(--color-text-primary)" : "var(--color-text-secondary)",
                    fontSize: 12, fontWeight: active ? 600 : 500,
                    boxShadow: active ? "0 6px 18px rgba(59,130,246,0.08)" : "0 8px 18px rgba(15,23,42,0.04)",
                    display: "flex", gap: 6, alignItems: "center",
                }}>
                    {label} <span style={{ opacity: 0.65 }}>{count}</span>
                </button>
            );
        }

        function TaskRow({ task, onClick, onToggleDone }) {
            const s = STATUS.find(x => x.v === task.status) || STATUS[0];
            const p = PRIORITY.find(x => x.v === task.priority) || PRIORITY[1];
            const subtaskCount = task.subtasks?.length || 0;
            const completedSubtasks = task.subtasks?.filter(st => st.done).length || 0;
            const progress = subtaskCount ? Math.round((completedSubtasks / subtaskCount) * 100) : 0;
            return (
                <div onClick={onClick} style={{
                    background: "var(--color-background-primary)",
                    border: "none",
                    borderRadius: "var(--border-radius-lg)",
                    padding: "18px 18px",
                    cursor: "pointer", display: "flex", alignItems: "center", gap: 14,
                    opacity: task.status === "done" ? 0.8 : 1,
                    transform: "translateZ(0)",
                    boxShadow: "var(--shadow-card)",
                    transition: "transform 150ms ease, box-shadow 150ms ease",
                }} onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"} onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}>
                    <div style={{ width: 4, minHeight: 34, borderRadius: 4, background: `var(${p.tv})`, flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 14, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textDecoration: task.status === "done" ? "line-through" : "none" }}>
                            {linkifyText(task.description)}
                        </div>
                        {task.date && <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginTop: 2 }}>{fmtDate(task.date)}{task.time ? ` · ${task.time}` : ""}</div>}
                        {subtaskCount > 0 && (
                            <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 6 }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10 }}>
                                    <span style={{ fontSize: 11, color: "var(--color-text-secondary)" }}>{completedSubtasks}/{subtaskCount} subtarea{subtaskCount !== 1 ? "s" : ""}</span>
                                    <span style={{ fontSize: 11, fontWeight: 700, color: completedSubtasks === subtaskCount ? "var(--color-text-success)" : "var(--color-text-info)" }}>{progress}%</span>
                                </div>
                                <div style={{ width: "100%", height: 6, borderRadius: 999, background: "rgba(148,163,184,0.18)" }}>
                                    <div style={{ width: `${progress}%`, height: "100%", borderRadius: 999, background: completedSubtasks === subtaskCount ? "var(--color-text-success)" : "var(--color-text-info)" }} />
                                </div>
                            </div>
                        )}
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0, flexWrap: "wrap" }}>
                        <button type="button" onClick={e => { e.stopPropagation(); onToggleDone?.(task.id); }} aria-label={task.status === "done" ? "Marcar como no completada" : "Marcar como completada"} style={{
                            width: 28, height: 28, borderRadius: 999, border: "1px solid var(--color-border-tertiary)",
                            background: task.status === "done" ? "var(--color-background-success)" : "var(--color-background-primary)",
                            color: task.status === "done" ? "var(--color-text-success)" : "var(--color-text-secondary)",
                            cursor: "pointer", fontSize: 12, fontWeight: 700,
                            display: "grid", placeItems: "center",
                        }}>
                            {task.status === "done" ? "✓" : "○"}
                        </button>
                        <Pill s={p} />
                        {task.category && <CategoryPill name={task.category} />}
                        <Pill s={s} />
                    </div>
                </div>
            );
        }

        /* ── Calendar view ── */
        function CalendarView({ y, mo, dIM, fD, tByDate, eByDate, todayStr, prev, next, selDay, setSelDay, onAddTaskForDay, onEditTask, onAddEventForDay, onEditEvent }) {
            const cells = [...Array(fD).fill(null), ...Array.from({ length: dIM }, (_, i) => i + 1)];
            const selDs = selDay ? toDateStr(y, mo, selDay) : null;

            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 20px" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
                            <div>
                                <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 4, letterSpacing: "0.06em", textTransform: "uppercase" }}>
                                    Calendario
                                </div>
                                <div style={{ fontSize: 18, fontWeight: 700 }}>
                                    {MONTHS[mo]} {y}
                                </div>
                            </div>
                            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                                <button type="button" onClick={() => onAddEventForDay(toDateStr(y, mo, new Date().getDate()))} style={{ padding: "6px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer", border: "1px solid var(--color-border-secondary)", background: "var(--color-background-primary)", color: "var(--color-text-primary)", borderRadius: "999px" }}>
                                    + Nuevo Evento
                                </button>
                                <NBtn onClick={prev}>{"‹"}</NBtn>
                                <NBtn onClick={next}>{"›"}</NBtn>
                            </div>
                        </div>

                        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 8, marginBottom: 8, color: "var(--color-text-secondary)", fontSize: 12, fontWeight: 600 }}>
                            {DAYS.map(day => (
                                <div key={day} style={{ textAlign: "center" }}>{day}</div>
                            ))}
                        </div>

                        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, minmax(0, 1fr))", gap: 8 }}>
                            {cells.map((day, index) => {
                                const dateStr = day ? toDateStr(y, mo, day) : null;
                                const eventsForDay = dateStr ? eByDate[dateStr] || [] : [];
                                const tasksForDay = dateStr ? tByDate[dateStr] || [] : [];
                                const isToday = dateStr === todayStr;
                                const isSelected = dateStr === selDs;

                                return (
                                    <div key={index} style={{
                                        position: "relative",
                                        minHeight: 110,
                                        padding: 14,
                                        borderRadius: "var(--border-radius-lg)",
                                        background: isSelected ? "#eef6ff" : isToday ? "#ecfdf5" : "#ffffff",
                                        border: `1px solid ${isSelected ? "#93c5fd" : isToday ? "#4ade80" : "rgba(148,163,184,0.16)"}`,
                                        color: day ? "var(--color-text-primary)" : "var(--color-text-secondary)",
                                        cursor: day ? "pointer" : "default",
                                        display: "flex",
                                        flexDirection: "column",
                                        justifyContent: "space-between",
                                        boxShadow: "var(--shadow-soft)",
                                    }} onClick={() => day && setSelDay(day)} onDoubleClick={() => day && onAddTaskForDay(dateStr)}>
                                        <div>
                                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                                                <span style={{ fontSize: 13, fontWeight: isToday ? 700 : 500, color: day ? (isToday ? "var(--color-text-success)" : "var(--color-text-primary)") : "var(--color-text-secondary)", padding: isToday ? "4px 9px" : undefined, borderRadius: isToday ? 999 : undefined, background: isToday ? "#d1fae5" : undefined }}>
                                                    {day || ""}
                                                </span>
                                                {(tasksForDay.length + eventsForDay.length) > 0 && (
                                                    <span style={{ fontSize: 11, color: "var(--color-text-secondary)", background: "var(--color-background-secondary)", padding: "2px 6px", borderRadius: 999 }}>
                                                        {tasksForDay.length}
                                                    </span>
                                                )}
                                            </div>

                                            {tasksForDay.slice(0, 2).map(task => (
                                                <div key={task.id} style={{ display: "inline-flex", alignItems: "center", padding: "4px 8px", borderRadius: 999, background: "rgba(59,130,246,0.12)", color: "var(--color-text-primary)", fontSize: 11, marginBottom: 4, maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                                    <span style={{ display: "inline-block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "100%", textDecoration: task.status === 'done' ? 'line-through' : 'none' }}>
                                                        {task.description}
                                                    </span>
                                                </div>
                                            ))}
                                            {eventsForDay.slice(0, 2 - tasksForDay.length).map(event => (
                                                <div key={event.id} onClick={e => { e.stopPropagation(); onEditEvent(event); }} style={{ display: "inline-flex", alignItems: "center", padding: "4px 8px", borderRadius: 999, background: event.color, color: "white", fontSize: 11, marginBottom: 4, maxWidth: "100%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                                    <span style={{ display: "inline-block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", maxWidth: "100%" }}>
                                                        {event.title}
                                                    </span>
                                                </div>
                                            ))}
                                            {day && (tasksForDay.length + eventsForDay.length) > 2 && (
                                                <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginTop: 4 }}>
                                                    +{(tasksForDay.length + eventsForDay.length) - 2} más
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div style={{ background: "var(--color-background-primary)", border: "0.5px solid var(--color-border-tertiary)", borderRadius: "var(--border-radius-lg)", padding: "16px 20px" }}>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                            <div>
                                <div style={{ fontSize: 12, color: "var(--color-text-secondary)", marginBottom: 3 }}>Día seleccionado</div>
                                <div style={{ fontSize: 16, fontWeight: 700 }}>
                                    {selDs ? `${DAYS[new Date(selDs).getDay()]}, ${fmtDate(selDs)}` : "Selecciona un día"}
                                </div>
                            </div>
                            {selDs && (
                                <button type="button" onClick={() => setSelDay(null)} style={{ border: "none", background: "transparent", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 13 }}>
                                    Cerrar
                                </button>
                            )}
                        </div>

                        {selDs ? (
                            ((tByDate[selDs] || []).length + (eByDate[selDs] || []).length) > 0 ? (
                                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                    {(eByDate[selDs] || []).map(event => (
                                        <div key={event.id} onClick={() => onEditEvent(event)} style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, padding: '10px 14px', borderRadius: 'var(--border-radius-lg)', background: event.color, color: 'white' }}>
                                            <div style={{ fontSize: 14, fontWeight: 500 }}>{event.title}</div>
                                            <div style={{ fontSize: 12, opacity: 0.8, marginLeft: 'auto' }}>
                                                {fmtDate(event.startDate)}{event.endDate && event.endDate !== event.startDate ? ` - ${fmtDate(event.endDate)}` : ''}
                                            </div>
                                        </div>
                                    ))}
                                    {(tByDate[selDs] || []).map(task => <TaskRow key={task.id} task={task} onClick={() => onEditTask(task)} />)}
                                </div>
                            ) : (
                                <div style={{ color: "var(--color-text-secondary)", fontSize: 14 }}>
                                    No hay tareas ni eventos para este día.
                                </div>
                            )
                        ) : (
                            <div style={{ color: "var(--color-text-secondary)", fontSize: 14 }}>
                                Haz clic en un día para ver o añadir tareas.
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function TaskModal({ task, categories, onSave, onDelete, onClose }) {
            const [form, setForm] = useState({ ...task, subtasks: task.subtasks || [], category: task.category || "", time: task.time || "" });
            const [subtaskText, setSubtaskText] = useState("");
            const [newCategory, setNewCategory] = useState("");

            useEffect(() => {
                setForm({ ...task, subtasks: task.subtasks || [], category: task.category || "", time: task.time || "" });
                setSubtaskText("");
                setNewCategory("");
            }, [task]);



            const handleDescriptionChange = value => {
                setForm(prev => ({
                    ...prev,
                    description: value,
                }));
            };

            const fillDateTime = () => {
                const preview = parseDateTimeFromDescription(form.description || "");
                if (!preview) return;
                const result = parseDescriptionDateResult(form.description || "");
                let cleaned = cleanDescriptionSegment(form.description, result?.text || "");
                if (!result?.text || cleaned === form.description.trim()) {
                    cleaned = cleaned.replace(/(?:\b(?:a|al|a la|a las|el|la|en|para)\b.*)$/i, "").replace(/\s{2,}/g, " ").trim();
                }
                setForm(prev => ({
                    ...prev,
                    description: cleaned || form.description.trim(),
                    date: preview.date,
                    time: preview.time || prev.time,
                }));
            };

            const handleChange = (field, value) => setForm(prev => ({ ...prev, [field]: value }));
            const addSubtask = () => {
                const text = subtaskText?.trim();
                if (!text) return;
                setForm(prev => ({
                    ...prev,
                    subtasks: [...(prev.subtasks || []), { id: uid(), text, done: false }],
                }));
                setSubtaskText("");
            };
            const toggleSubtask = id => {
                setForm(prev => ({
                    ...prev,
                    subtasks: prev.subtasks.map(st => st.id === id ? { ...st, done: !st.done } : st),
                }));
            };
            const removeSubtask = id => {
                setForm(prev => ({
                    ...prev,
                    subtasks: prev.subtasks.filter(st => st.id !== id),
                }));
            };

            const onSubmit = e => {
                e.preventDefault();
                if (!form.description || !form.description.trim()) {
                    return;
                }
                const category = newCategory.trim() || form.category || "";
                const parsed = parseDateTimeFromDescription(form.description);
                const finalForm = {
                    ...form,
                    category,
                    date: form.date || parsed?.date || "",
                    time: form.time || parsed?.time || "",
                };
                onSave(finalForm);
            };

            const preview = parseDateTimeFromDescription(form.description || "");
            const previewLabel = preview ? `Se creará para: ${fmtDate(preview.date)}${preview.time ? ` · ${preview.time}` : ""}` : null;

            return (
                <form onSubmit={onSubmit} style={{ width: "min(420px, 100%)", maxWidth: "calc(100% - 32px)", background: "var(--color-background-primary)", borderRadius: "var(--border-radius-lg)", boxShadow: "var(--shadow-card)", padding: 24, color: "var(--color-text-primary)" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, gap: 12, flexWrap: "wrap" }}>
                        <div>
                            <div style={{ fontSize: 18, fontWeight: 700 }}>{task.id ? "Editar tarea" : "Nueva tarea"}</div>
                            <div style={{ fontSize: 13, color: "var(--color-text-secondary)", marginTop: 4 }}>
                                {task.id ? "Actualiza los detalles de la tarea." : "Crea una tarea nueva rápidamente."}
                            </div>
                        </div>
                        <button type="button" onClick={onClose} aria-label="Cerrar modal" style={{ border: "none", background: "transparent", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 22, lineHeight: 1 }}>
                            ×
                        </button>
                    </div>

                    <label style={{ display: "block", marginBottom: 14, fontSize: 13, color: "var(--color-text-secondary)" }}>
                        Descripción
                        <textarea value={form.description} onChange={e => handleDescriptionChange(e.target.value)} rows={3} style={{ width: "100%", boxSizing: "border-box", marginTop: 6, borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: 10, fontSize: 13, resize: "vertical" }} />
                    </label>
                    {previewLabel && (
                        <div style={{ marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, fontSize: 12, color: "var(--color-text-secondary)", background: "rgba(56,189,248,0.08)", border: "1px solid rgba(56,189,248,0.18)", borderRadius: "var(--border-radius-md)", padding: "10px 12px" }}>
                            <span>{previewLabel}</span>
                            <button type="button" onClick={fillDateTime} style={{ border: "none", background: "rgba(37,99,235,0.12)", color: "var(--color-accent)", borderRadius: "999px", padding: "6px 12px", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                                Autofill
                            </button>
                        </div>
                    )}

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Categoría</span>
                            <select value={form.category} onChange={e => { handleChange("category", e.target.value); setNewCategory(""); }} style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }}>
                                <option value="">Selecciona categoría</option>
                                {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                            </select>
                        </label>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Nueva categoría</span>
                            <input value={newCategory} onChange={e => setNewCategory(e.target.value)} placeholder="Nombre de categoría" style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                    </div>
                    <div style={{ fontSize: 11, color: "var(--color-text-secondary)", marginBottom: 14 }}>
                        Elige una categoría existente o escribe una nueva; la nueva categoría reemplazará la selección.
                    </div>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 12, marginBottom: 14, alignItems: "end" }}>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Subtarea</span>
                            <input value={subtaskText} onChange={e => setSubtaskText(e.target.value)} placeholder="Añadir nueva subtarea" style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                        <button type="button" onClick={addSubtask} disabled={!subtaskText.trim()} style={{ height: 44, minWidth: 100, borderRadius: "var(--border-radius-md)", border: "none", background: subtaskText.trim() ? "var(--color-background-info)" : "var(--color-background-secondary)", color: subtaskText.trim() ? "var(--color-text-info)" : "var(--color-text-secondary)", fontWeight: 700, cursor: subtaskText.trim() ? "pointer" : "not-allowed" }}>
                            Añadir
                        </button>
                    </div>

                    {form.subtasks?.length > 0 && (
                        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14, maxHeight: 180, overflowY: "auto" }}>
                            {form.subtasks.map(st => (
                                <div key={st.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: "var(--border-radius-md)", background: "var(--color-background-secondary)", border: "0.5px solid var(--color-border-tertiary)" }}>
                                    <button type="button" onClick={() => toggleSubtask(st.id)} aria-label={st.done ? "Marcar subtarea como pendiente" : "Marcar subtarea como completa"} style={{ width: 26, height: 26, borderRadius: 999, border: "1px solid var(--color-border-tertiary)", background: st.done ? "var(--color-background-success)" : "var(--color-background-primary)", color: st.done ? "var(--color-text-success)" : "var(--color-text-secondary)", display: "grid", placeItems: "center", cursor: "pointer" }}>
                                        {st.done ? "✓" : "○"}
                                    </button>
