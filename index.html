                                    <div style={{ flex: 1, fontSize: 13, color: st.done ? "var(--color-text-secondary)" : "var(--color-text-primary)", textDecoration: st.done ? "line-through" : "none" }}>
                                        {st.text}
                                    </div>
                                    <button type="button" onClick={() => removeSubtask(st.id)} aria-label="Eliminar subtarea" style={{ border: "none", background: "transparent", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 18, lineHeight: 1 }}>
                                        ×
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 10, marginBottom: 14 }}>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Fecha inicio</span>
                            <input type="date" value={form.date} onChange={e => handleChange("date", e.target.value)} style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Fecha fin</span>
                            <input type="date" value={form.endDate || ""} min={form.date} onChange={e => handleChange("endDate", e.target.value)} style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Hora</span>
                            <input type="time" value={form.time} onChange={e => handleChange("time", e.target.value)} style={{ width: "90px", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                    </div>

                    <label style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 18, fontSize: 13, color: "var(--color-text-secondary)" }}>
                        <span style={{ fontWeight: 500 }}>Estado</span>
                        <select value={form.status} onChange={e => handleChange("status", e.target.value)} style={{ width: "100%", minHeight: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }}>
                            {STATUS.map(option => <option key={option.v} value={option.v}>{option.label}</option>)}
                        </select>
                    </label>

                    <div style={{ display: "flex", gap: 10 }}>
                        <button type="button" onClick={onDelete} disabled={!onDelete} style={{ flex: 1, borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", background: onDelete ? "var(--color-background-danger)" : "var(--color-background-secondary)", color: onDelete ? "var(--color-text-danger)" : "var(--color-text-secondary)", padding: "11px 0", cursor: onDelete ? "pointer" : "not-allowed" }}>
                            Eliminar
                        </button>
                        <button type="submit" style={{ flex: 1, borderRadius: "var(--border-radius-md)", border: "none", background: "var(--color-background-info)", color: "var(--color-text-info)", fontWeight: 700, padding: "11px 0", cursor: "pointer" }}>
                            Guardar
                        </button>
                    </div>
                </form>
            );
        }

        function EventModal({ event, onSave, onDelete, onClose }) {
            const [form, setForm] = useState(event);
            const COLORS = ["#2563eb", "#db2777", "#16a34a", "#d97706", "#7c3aed", "#4b5563"];

            useEffect(() => { setForm(event); }, [event]);

            const handleChange = (field, value) => setForm(p => ({ ...p, [field]: value }));

            const onSubmit = e => {
                e.preventDefault();
                if (!form.title.trim() || !form.startDate) return;
                const finalForm = { ...form, endDate: form.endDate || form.startDate };
                if (finalForm.endDate < finalForm.startDate) {
                    finalForm.endDate = finalForm.startDate;
                }
                onSave(finalForm);
            };

            return (
                <form onSubmit={onSubmit} style={{ width: "min(420px, 100%)", maxWidth: "calc(100% - 32px)", background: "var(--color-background-primary)", borderRadius: "var(--border-radius-lg)", boxShadow: "var(--shadow-card)", padding: 24, color: "var(--color-text-primary)" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16, gap: 12 }}>
                        <div style={{ fontSize: 18, fontWeight: 700 }}>{event.id ? "Editar evento" : "Nuevo evento"}</div>
                        <button type="button" onClick={onClose} aria-label="Cerrar modal" style={{ border: "none", background: "transparent", color: "var(--color-text-secondary)", cursor: "pointer", fontSize: 22, lineHeight: 1 }}>×</button>
                    </div>

                    <label style={{ display: "block", marginBottom: 14, fontSize: 13, color: "var(--color-text-secondary)" }}>
                        Título del evento
                        <input value={form.title} onChange={e => handleChange("title", e.target.value)} style={{ width: "100%", boxSizing: "border-box", marginTop: 6, borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: 10, fontSize: 13 }} />
                    </label>

                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Fecha inicio</span>
                            <input type="date" value={form.startDate} onChange={e => handleChange("startDate", e.target.value)} style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                        <label style={{ display: "flex", flexDirection: "column", gap: 6, fontSize: 13, color: "var(--color-text-secondary)" }}>
                            <span style={{ fontWeight: 500 }}>Fecha fin</span>
                            <input type="date" value={form.endDate || ""} min={form.startDate} onChange={e => handleChange("endDate", e.target.value)} style={{ width: "100%", height: 44, boxSizing: "border-box", borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", padding: "10px 12px", fontSize: 13, background: "var(--color-background-primary)", appearance: "none" }} />
                        </label>
                    </div>

                    <div style={{ marginBottom: 18 }}>
                        <div style={{ fontSize: 13, color: "var(--color-text-secondary)", fontWeight: 500, marginBottom: 6 }}>Color</div>
                        <div style={{ display: "flex", gap: 10 }}>
                            {COLORS.map(c => <button key={c} type="button" onClick={() => handleChange("color", c)} style={{ width: 36, height: 36, borderRadius: 999, background: c, border: form.color === c ? "3px solid var(--color-background-primary)" : "3px solid transparent", boxShadow: `0 0 0 1px ${form.color === c ? c : 'var(--color-border-tertiary)'}`, cursor: 'pointer' }} />)}
                        </div>
                    </div>

                    <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
                        <button type="button" onClick={onDelete} disabled={!onDelete} style={{ flex: 1, borderRadius: "var(--border-radius-md)", border: "0.5px solid var(--color-border-secondary)", background: onDelete ? "var(--color-background-danger)" : "var(--color-background-secondary)", color: onDelete ? "var(--color-text-danger)" : "var(--color-text-secondary)", padding: "11px 0", cursor: onDelete ? "pointer" : "not-allowed" }}>
                            Eliminar
                        </button>
                        <button type="submit" style={{ flex: 1, borderRadius: "var(--border-radius-md)", border: "none", background: "var(--color-background-info)", color: "var(--color-text-info)", fontWeight: 700, padding: "11px 0", cursor: "pointer" }}>
                            Guardar
                        </button>
                    </div>
                </form>
            );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>

    <!-- PWA: Registro del Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js').then(function (reg) {
                    console.log('[PWA] Service Worker registrado:', reg.scope);
                    reg.addEventListener('updatefound', function () {
                        var newWorker = reg.installing;
                        newWorker.addEventListener('statechange', function () {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('[PWA] Nueva versión disponible. Recarga para actualizar.');
                            }
                        });
                    });
                }).catch(function (err) {
                    console.warn('[PWA] Error al registrar Service Worker:', err);
                });
            });
        }
    </script>
</body>

</html>
