name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm exec -w apps/taskmanager playwright -- install --with-deps chromium

      - name: Run unit tests, lint, and E2E
        run: npm run test:verify

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/taskmanager/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/taskmanager/test-results/
          retention-days: 7
