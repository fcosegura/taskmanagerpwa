#:schema node_modules/wrangler/config-schema.json
name = "student-planner-lite"
main = "src/worker.js"
compatibility_date = "2024-04-03"

[vars]
# Must match Google OAuth client ID (Login.jsx) and token audience check in worker.
GOOGLE_CLIENT_ID = "365692313483-g4tv5i5agl4egs67h980vn6ce977p7df.apps.googleusercontent.com"

[assets]
directory = "./dist"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "student-planner-lite-db"
# Replace with your D1 database_id from Cloudflare dashboard (`wrangler d1 create`).
database_id = "00000000-0000-0000-0000-000000000001"
